name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Get version
        id: version
        run: |
          # Try to get version from git tag, otherwise use date-based version
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(date +%Y.%m.%d)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            jemojemo/archi2drawio:${{ steps.version.outputs.version }}
            jemojemo/archi2drawio:latest

  test-drawio-export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Extract Archi scripting plugin
        run: |
          docker create --name archi-plugin jemojemo/archi-scripting-plugin:latest true
          docker cp archi-plugin:/plugin/archi-scripting-plugin.archiplugin archi-scripting-plugin.zip
          docker rm archi-plugin

      - name: Export Archinsurance to drawio
        run: |
          docker run --rm \
            --entrypoint "" \
            -v "$PWD:/workspace" \
            -w /workspace \
            woozymasta/archimate-ci-image:5.7.0-1.0.6 \
            sh -c '
              set -ex

              echo "=== Checking model file ==="
              ls -lh /workspace/src/test/Archinsurance.archimate

              echo "=== Installing scripting plugin ==="
              mkdir -p /root/.archi/dropins
              unzip -o /workspace/archi-scripting-plugin.zip -d /root/.archi/dropins/
              ls -lR /root/.archi/dropins/

              echo "=== Copying scripts ==="
              mkdir -p /root/Documents/Archi/scripts
              cp /workspace/dist/*.ajs /root/Documents/Archi/scripts/
              ls -lh /root/Documents/Archi/scripts/

              echo "=== Checking Archi binary ==="
              ls -lh /opt/Archi/Archi
              cat /opt/Archi/Archi.ini || true

              echo "=== Checking xvfb ==="
              which xvfb-run || echo "xvfb-run not found"
              which Xvfb || echo "Xvfb not found"

              echo "=== Running Archi ==="
              xvfb-run /opt/Archi/Archi \
                -application com.archimatetool.commandline.app \
                -a --launcher.suppressErrors -consoleLog -nosplash \
                --abortOnException \
                --loadModel /workspace/src/test/Archinsurance.archimate \
                --script.runScript /root/Documents/Archi/scripts/todrawio.bundle.ajs \
                --drawioOutputFile /workspace/Archinsurance.drawio
              ARCHI_EXIT=$?

              echo "=== Archi exit code: $ARCHI_EXIT ==="
              echo "=== Checking output files ==="
              ls -lh /workspace/*.drawio 2>/dev/null || echo "No .drawio files found"
              echo "=== Archi workspace log ==="
              cat /root/.archi/.metadata/.log 2>/dev/null || echo "No Archi log found"
              exit $ARCHI_EXIT
            '

      - name: Upload drawio artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drawio-export
          path: "*.drawio"
